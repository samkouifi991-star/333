# ============================================================
# KALSHI PRO TRADING SYSTEM - Configuration
# ============================================================

api:
  kalshi_base_url: "https://api.kalshi.com/trade-api/v2"
  # Auth via env vars: KALSHI_API_KEY_ID + KALSHI_PRIVATE_KEY_PATH (or KALSHI_PRIVATE_KEY_PEM)
  odds_api_key: "${ODDS_API_KEY}"
  odds_api_base: "https://api.the-odds-api.com/v4"

# ----------------------------------------------------------
# STRATEGY TOGGLES - enable/disable independently
# ----------------------------------------------------------
strategies:
  spread_arb:
    enabled: true
    mode: "paper"          # paper | live
    min_edge_cents: 2      # YES_ask + NO_ask < 98 → edge = 100 - sum
    max_position: 5000     # contracts per market
    clip_sizes: [100, 250, 500, 800]
    exit_target_cents: 1   # lock in 1¢ guaranteed profit minimum
    max_concurrent: 10

  scalper:
    enabled: true
    mode: "paper"
    entry_deviation_cents: 5   # enter when price deviates 5¢+ from fair value
    exit_target_cents: 7       # take profit at +7¢
    stop_loss_cents: 10        # cut at -10¢
    max_hold_seconds: 300      # force exit after 5 min
    ladder_layers: 3           # 3 limit orders spaced 2¢ apart
    ladder_spacing_cents: 2
    clip_sizes: [50, 100, 200, 500]
    max_position: 3000
    max_concurrent: 8
    cooldown_seconds: 30       # wait 30s after exit before re-entering same market

  value_maker:
    enabled: true
    mode: "paper"
    min_edge_pct: 7            # require 7% edge vs sportsbook
    entry_below_mid_cents: 5   # place limit 5¢ below mid
    exit_target_cents: 5       # TP at +5¢
    stale_order_seconds: 180   # cancel/repost after 3 min
    max_position: 10000
    clip_sizes: [280, 500, 1000, 2026, 2232]  # jpmorgan.chase signature clips
    max_concurrent: 6

  tennis_mm:
    enabled: true
    mode: "paper"
    spread_capture_cents: 4    # min bid-ask spread to trade
    max_position: 2000
    ladder_layers: 5           # 5 price levels
    ladder_spacing_cents: 3    # 3¢ apart
    clip_sizes: [50, 100, 200, 500, 800]
    inventory_limit: 1500      # max net inventory before hedging
    hedge_threshold: 1000      # start hedging above this
    max_concurrent: 4

# ----------------------------------------------------------
# MARKET UNIVERSE - strict classification filters
# ----------------------------------------------------------
market_universe:
  # Kalshi series tickers to scan
  series:
    nba: ["KXNBA"]
    nfl: ["KXNFL"]
    mlb: ["KXMLB"]
    nhl: ["KXNHL"]
    ncaab: ["KXNCAAB"]
    tennis: ["KXTENNIS", "KXATP", "KXWTA"]

  # Hard rejection patterns
  reject_tickers:
    - "MULTIGAME"
    - "EXTENDED"
    - "COMBO"
    - "PARLAY"

  reject_title_tokens:
    - "combo"
    - "parlay"
    - "multi"
    - "round of"
    - "qualifier"
    - "championship winner"   # tournament futures - too illiquid

  # Title patterns for market type classification
  classification:
    game_winner:
      patterns:
        - "^(.+) at (.+)$"                    # "Team A at Team B"
        - "^(.+) vs (.+)$"                    # "Team A vs Team B"
        - "^Will (.+) win"                    # "Will X win?"
      reject_if_contains: ["spread", "total", "over", "under", "points", "half"]

    spread:
      patterns:
        - "wins by over ([\\d.]+)"
        - "Spread$"
      require_contains: ["spread", "wins by over", "wins by under"]

    total:
      patterns:
        - "Over ([\\d.]+) points"
        - "Total Points$"
        - "Total$"
      require_contains: ["total", "over", "under", "points scored"]

    tennis_match:
      patterns:
        - "^(.+) vs (.+)$"   # Tennis uses "vs" format
      series_filter: ["KXTENNIS", "KXATP", "KXWTA"]

    first_half:
      patterns:
        - "First Half"
        - "1H"
      require_contains: ["first half", "1h", "1H"]

# ----------------------------------------------------------
# RISK MANAGEMENT
# ----------------------------------------------------------
risk:
  max_total_exposure: 50000    # total $ at risk across all strategies
  max_per_event: 10000         # max $ on one event
  max_per_market: 5000         # max $ on one market contract
  max_daily_loss: 5000         # stop trading for the day
  pre_event_exit_minutes: 5    # close all positions 5 min before event
  max_open_orders: 50          # total open orders across all strategies

# ----------------------------------------------------------
# LIQUIDITY FILTERS
# ----------------------------------------------------------
liquidity:
  min_volume: 100              # market must have 100+ contracts traded
  min_open_interest: 50        # at least 50 contracts open
  max_spread_cents: 15         # don't trade if spread > 15¢
  min_book_depth: 3            # at least 3 levels on each side

# ----------------------------------------------------------
# FAIR VALUE SOURCES
# ----------------------------------------------------------
fair_value:
  sportsbook_sports:
    - americanfootball_nfl
    - basketball_nba
    - baseball_mlb
    - icehockey_nhl
    - basketball_ncaab
    - tennis_atp_french_open
    - tennis_wta_french_open
  bookmakers:
    - draftkings
    - fanduel
    - betmgm
    - pinnacle
  devig_method: "power"        # power | multiplicative | shin

# ----------------------------------------------------------
# LOGGING & METRICS
# ----------------------------------------------------------
logging:
  level: "INFO"
  file: "kalshi_pro.log"
  diagnostics_interval_scans: 10
  metrics_report_interval_seconds: 300

# ----------------------------------------------------------
# PAPER TRADING
# ----------------------------------------------------------
paper:
  initial_balance: 10000
  simulated_fill_rate: 0.65    # 65% of limit orders fill
  simulated_slippage_cents: 1
  min_profitable_trades_to_go_live: 30
  min_win_rate_to_go_live: 0.55
  min_profit_factor_to_go_live: 1.3   # gross profit / gross loss > 1.3
